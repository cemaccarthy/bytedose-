<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover is required for iPhone safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f2f2f7">
    
    <title>Decimal Med Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header with Decimal Clock -->
    <header id="app-header">
        <div class="clock-container">
            <span id="decimal-clock" class="clock-time">00:00:00</span>
            <span class="clock-label">DECIMAL TIME</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content">
        
        <!-- Dashboard View -->
        <section id="view-dashboard" class="view active">
            <h2>Today's Tracker</h2>
            
            <!-- Timer Widget (Shows when a timer is running) -->
            <div id="timer-widget" class="card timer-card hidden">
                <h3>Active Timer</h3>
                <div class="timer-value" id="timer-value">00:00:00</div>
                <button id="btn-stop-timer" class="btn btn-danger">Stop & Log</button>
            </div>

            <!-- Empty State (Shows when no timer is running) -->
            <div id="no-timer-msg" class="card empty-state">
                <p>No active timers.</p>
                <button id="btn-start-timer" class="btn btn-primary">Start Test Timer</button>
            </div>
            
            <!-- Placeholder for Medications List -->
            <div id="meds-list" class="card">
                <p class="placeholder-text">Medications will appear here in Step 2.</p>
            </div>
        </section>

        <!-- Meds View (Stub) -->
        <section id="view-meds" class="view">
            <h2>Manage Medications</h2>
            <div class="card">
                <p class="placeholder-text">Add/Edit meds coming in Step 2.</p>
            </div>
        </section>

        <!-- History View (Stub) -->
        <section id="view-history" class="view">
            <h2>History</h2>
            <div class="card">
                <p class="placeholder-text">Logs coming in Step 2.</p>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="dashboard">
            <span class="nav-icon">🏠</span> Dashboard
        </button>
        <button class="nav-btn" data-view="meds">
            <span class="nav-icon">💊</span> Meds
        </button>
        <button class="nav-btn" data-view="history">
            <span class="nav-icon">📊</span> History
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
